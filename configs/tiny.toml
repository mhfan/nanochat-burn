schema_version = 1
seed = 42

[artifacts]
pretrain = "runs/tiny/pretrain"
sft = "runs/tiny/sft"
rl = "runs/tiny/rl"

[pretrain]
text_path = "runs/tiny/data/pretrain.txt"
token_path = "runs/tiny/data/pretrain.bin"
checkpoint_interval = 2

[pretrain.corpus]
kind = "text"
path = "data/fixtures/tiny/corpus.txt"
repeats = 12

[pretrain.model]
sequence_len = 64
vocab_size = 320
n_layer = 1
n_head = 2
n_kv_head = 1
n_embd = 16
window_pattern = "L"

[pretrain.model.features]
relu_squared = true
qk_norm = true
gqa = true
swa = true
smear = true
backout = true

[pretrain.training]
optimizer = "muon_adam_w"
num_iterations = 6
warmup_steps = 1
warmdown_ratio = 0.3
final_lr_frac = 0.1
learning_rate = 0.001
weight_decay = 0.1
device_batch_size = 1
total_batch_size = 1

[sft]
dataset_path = "data/fixtures/tiny/sft.jsonl"
log_interval = 1

[sft.training]
optimizer = "muon_adam_w"
num_iterations = 6
warmup_steps = 1
warmdown_ratio = 0.5
final_lr_frac = 0.0
learning_rate = 0.0001
weight_decay = 0.0
device_batch_size = 2
total_batch_size = 2

[rl]
algorithm = "group_normalized_reinforce"
dataset_path = "data/fixtures/tiny/eval.jsonl"
num_steps = 1
learning_rate = 0.0001
batch_size = 1
num_samples = 2
max_generation_tokens = 16
temperature = 1.0
top_k = 20
repetition_penalty = 1.0
kl_coefficient = 0.01
clip_epsilon = 0.2
update_epochs = 1

[eval]
max_generation_tokens = 16

[[eval.tasks]]
name = "Tiny Rust Basics"
path = "data/fixtures/tiny/eval.jsonl"
kind = "categorical"
